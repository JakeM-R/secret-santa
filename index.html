<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Santa 🎅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #8B0000 0%, #5C0000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Falling snowflakes */
        .snowflake {
            position: fixed;
            top: -10px;
            z-index: 1;
            color: white;
            font-size: 1em;
            text-shadow: 0 0 5px rgba(255,255,255,0.8);
            animation: fall linear infinite;
            opacity: 0.7;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            max-width: 700px;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        h1 {
            text-align: center;
            color: #8B0000;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #1B4D1B;
            font-size: 1.2em;
            margin-bottom: 30px;
            font-style: italic;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 1.1em;
        }

        .field-hint {
            display: block;
            margin-top: 6px;
            color: #888;
            font-size: 0.88em;
            font-style: italic;
        }

        select, input {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #1B4D1B;
        }

        .reveal-btn {
            width: 100%;
            padding: 18px;
            font-size: 1.3em;
            font-weight: bold;
            background: linear-gradient(135deg, #1B4D1B 0%, #0B6623 100%);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .reveal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(27, 77, 27, 0.4);
        }

        .reveal-btn:disabled {
            opacity: 0.8;
            cursor: not-allowed;
            transform: none;
        }

        /* Shimmer effect on button while loading */
        .reveal-btn.loading::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 1.2s infinite;
        }

        @keyframes shimmer {
            to { left: 100%; }
        }

        /* Animation Container */
        .animation-container {
            display: none;
            margin-top: 40px;
            position: relative;
            min-height: 300px;
        }

        .animation-container.active {
            display: block;
        }

        .animation-title {
            text-align: center;
            color: #8B0000;
            font-size: 1.8em;
            margin-bottom: 50px;
            font-weight: bold;
            opacity: 0;
            animation: fadeInDown 0.7s ease forwards;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Cards Container */
        .cards-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            align-items: center;
            flex-wrap: nowrap;
        }

        .ampersand {
            font-size: 2.5em;
            color: #1B4D1B;
            font-weight: bold;
            margin: 0 5px;
            flex-shrink: 0;
        }

        /* Card flip container */
        .card-flip-container {
            perspective: 1000px;
            width: 220px;
            height: 160px;
            flex-shrink: 0;
        }

        .card {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        /* Front of card — pulses gently while waiting */
        .card-front {
            background: linear-gradient(135deg, #8B0000 0%, #B22222 100%);
            color: white;
        }

        .card-front .question-mark {
            font-size: 5em;
            font-weight: bold;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            animation: pulse 1.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }

        /* Stop pulsing once flipped */
        .card.flipped .question-mark {
            animation: none;
        }

        /* Back of card (name) */
        .card-back {
            background: linear-gradient(160deg, #fffdf8 0%, #fff4e6 100%);
            color: #8B0000;
            transform: rotateY(180deg);
            border: 3px solid #1B4D1B;
            flex-direction: column;
            gap: 6px;
        }

        .card-back h2 {
            font-size: 2.2em;
            text-align: center;
            padding: 0 15px;
            margin: 0;
            line-height: 1.1;
        }

        /* Confetti */
        .confetti {
            position: fixed;
            top: -15px;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confetti-fall linear forwards;
        }

        .confetti.circle {
            border-radius: 50%;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 1;
            }
            80% {
                opacity: 1;
            }
            100% {
                transform: translateY(105vh) translateX(var(--drift)) rotate(720deg);
                opacity: 0;
            }
        }

        /* Success message */
        .success-message {
            background: linear-gradient(135deg, rgba(27,77,27,0.08) 0%, rgba(27,77,27,0.15) 100%);
            border: 2px solid #1B4D1B;
            color: #0B4D0B;
            padding: 28px 24px;
            border-radius: 15px;
            margin-top: 35px;
            text-align: center;
            font-size: 1.25em;
            font-weight: bold;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.6s ease, transform 0.6s ease;
            line-height: 1.5;
        }

        .success-message .success-sub {
            display: block;
            font-size: 0.75em;
            font-weight: normal;
            margin-top: 8px;
            color: #1B4D1B;
            opacity: 0.85;
        }

        .success-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .error-message {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            color: #721c24;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
        }

        @media (max-width: 600px) {
            body {
                padding: 12px;
            }

            .container {
                padding: 24px 18px;
            }

            h1 {
                font-size: 1.9em;
            }

            .subtitle {
                font-size: 1.05em;
                margin-bottom: 22px;
            }

            /* Prevent iOS auto-zoom on focus */
            select, input {
                font-size: 16px;
                padding: 14px 12px;
            }

            .reveal-btn {
                font-size: 1.15em;
                padding: 20px;
                margin-top: 16px;
            }

            .animation-container {
                margin-top: 20px;
                min-height: 0;
            }

            .animation-title {
                font-size: 1.25em;
                margin-bottom: 22px;
            }

            /* Stack cards vertically — much cleaner on phone */
            .cards-container {
                flex-direction: column;
                align-items: center;
                gap: 10px;
                padding: 0;
            }

            .ampersand {
                font-size: 1.6em;
                margin: 2px 0;
            }

            .card-flip-container {
                width: min(340px, 100%);
                height: 110px;
            }

            .card-back h2 {
                font-size: 2em;
            }

            .card-front .question-mark {
                font-size: 3em;
            }

            .success-message {
                font-size: 1.1em;
                padding: 22px 16px;
                margin-top: 22px;
            }
        }
    </style>
</head>
<body>
    <!-- Falling snowflakes -->
    <div id="snowfall"></div>

    <div class="container">
        <h1>🎅 Secret Santa 🎄</h1>
        <p class="subtitle">Find out who you're buying for this year!</p>

        <!-- Form Section -->
        <div id="form-section">
            <div class="form-group">
                <label for="name-select">Select Your Name:</label>
                <select id="name-select">
                    <option value="">-- Choose your name --</option>
                </select>
                <span class="field-hint">Not seeing your name? You've already peeked! 🎁</span>
            </div>

            <div class="form-group">
                <label for="email-input">Enter Your Email:</label>
                <input type="email" id="email-input" placeholder="your.email@example.com">
                <span class="field-hint">We'll send a copy straight to your inbox too.</span>
            </div>

            <button class="reveal-btn" id="reveal-btn">
                🎁 Reveal My Secret Santa Picks! 🎁
            </button>
        </div>

        <!-- Animation Section -->
        <div class="animation-container" id="animation-container">
            <h2 class="animation-title">🎄 You're giving gifts to... 🎄</h2>

            <div class="cards-container">
                <!-- Card 1 -->
                <div class="card-flip-container">
                    <div class="card" id="card1">
                        <div class="card-face card-front">
                            <div class="question-mark">🎁</div>
                        </div>
                        <div class="card-face card-back">
                            <h2 id="name1"></h2>
                        </div>
                    </div>
                </div>

                <!-- Ampersand -->
                <div class="ampersand">&amp;</div>

                <!-- Card 2 -->
                <div class="card-flip-container">
                    <div class="card" id="card2">
                        <div class="card-face card-front">
                            <div class="question-mark">🎁</div>
                        </div>
                        <div class="card-face card-back">
                            <span class="card-star">⭐</span>
                            <h2 id="name2"></h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Messages -->
        <div id="message-area"></div>
    </div>

    <script>
        const API_URL = 'https://soft-sea-388e.j-makkingrobinson.workers.dev';

        const isMobile = window.innerWidth < 600;
        let selectedName = '';

        function createSnowfall() {
            const snowfall = document.getElementById('snowfall');
            const count = isMobile ? 20 : 50;
            for (let i = 0; i < count; i++) {
                const snowflake = document.createElement('div');
                snowflake.classList.add('snowflake');
                snowflake.innerHTML = '❄';
                snowflake.style.left = Math.random() * 100 + '%';
                snowflake.style.animationDuration = (Math.random() * 3 + 2) + 's';
                snowflake.style.animationDelay = Math.random() * 5 + 's';
                snowflake.style.fontSize = (Math.random() * 10 + 10) + 'px';
                snowfall.appendChild(snowflake);
            }
        }

        async function loadFamily() {
            try {
                const response = await fetch(`${API_URL}/api/family`);
                const family = await response.json();
                const select = document.getElementById('name-select');
                family.forEach(member => {
                    const option = document.createElement('option');
                    option.value = member.name;
                    option.textContent = member.name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading family:', error);
                showMessage('Error loading family members. Please refresh the page.', 'error');
            }
        }

        function createConfetti() {
            const colours = ['#C41E3A', '#1B4D1B', '#DAA520', '#B22222', '#2E7D32', '#FFD700', '#8B0000'];
            const count = isMobile ? 60 : 120;
            for (let i = 0; i < count; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');

                if (Math.random() > 0.5) confetti.classList.add('circle');

                const colour = colours[Math.floor(Math.random() * colours.length)];
                confetti.style.background = colour;

                const size = Math.random() * 8 + 6;
                confetti.style.width = size + 'px';
                confetti.style.height = size + 'px';

                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-15px';

                const drift = (Math.random() - 0.5) * 250;
                confetti.style.setProperty('--drift', drift + 'px');

                const duration = Math.random() * 2 + 2.5;
                confetti.style.animationDuration = duration + 's';
                confetti.style.animationDelay = Math.random() * 0.6 + 's';

                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), (duration + 0.6) * 1000 + 500);
            }
        }

        function showMessage(text, type) {
            const messageArea = document.getElementById('message-area');
            const div = document.createElement('div');
            div.className = type === 'error' ? 'error-message' : 'success-message';
            if (type === 'success') {
                div.innerHTML = text;
            } else {
                div.textContent = text;
            }
            messageArea.innerHTML = '';
            messageArea.appendChild(div);
            if (type === 'success') {
                setTimeout(() => div.classList.add('show'), 100);
            }
        }

        async function revealRecipients(recipient1, recipient2) {
            const formSection = document.getElementById('form-section');
            const animationContainer = document.getElementById('animation-container');
            const card1 = document.getElementById('card1');
            const card2 = document.getElementById('card2');

            document.getElementById('name1').textContent = recipient1;
            document.getElementById('name2').textContent = recipient2;

            formSection.style.display = 'none';
            animationContainer.classList.add('active');
            animationContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });

            await new Promise(resolve => setTimeout(resolve, 900));
            card1.classList.add('flipped');

            await new Promise(resolve => setTimeout(resolve, 2400));
            card2.classList.add('flipped');

            await new Promise(resolve => setTimeout(resolve, 1200));
            createConfetti();

            await new Promise(resolve => setTimeout(resolve, 1000));
            showMessage(
                `🎄 Merry Christmas, ${selectedName}! 🎄<span class="success-sub">A copy has been sent to your email too. 📬</span>`,
                'success'
            );
        }

        document.getElementById('reveal-btn').addEventListener('click', async () => {
            const name = document.getElementById('name-select').value;
            const email = document.getElementById('email-input').value;
            selectedName = name;

            if (!name) {
                showMessage('Please select your name!', 'error');
                return;
            }

            if (!email || !email.includes('@')) {
                showMessage('Please enter a valid email address!', 'error');
                return;
            }

            const btn = document.getElementById('reveal-btn');
            btn.disabled = true;
            btn.classList.add('loading');
            btn.textContent = '✨ Generating Magic... ✨';

            try {
                const response = await fetch(`${API_URL}/api/get-assignment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to get assignment');
                }

                await revealRecipients(data.recipient1, data.recipient2);

            } catch (error) {
                console.error('Error:', error);
                showMessage('Something went wrong! Please try again.', 'error');
                btn.disabled = false;
                btn.classList.remove('loading');
                btn.textContent = '🎁 Reveal My Secret Santa Picks! 🎁';
            }
        });

        createSnowfall();
        loadFamily();
    </script>
</body>
</html>
