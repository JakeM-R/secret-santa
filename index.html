<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Santa 🎅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #8B0000 0%, #5C0000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .snowflake {
            position: fixed;
            top: -10px;
            z-index: 1;
            color: white;
            font-size: 1em;
            text-shadow: 0 0 5px rgba(255,255,255,0.8);
            animation: fall linear infinite;
            opacity: 0.7;
        }

        @keyframes fall {
            to { transform: translateY(100vh); }
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            max-width: 700px;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        h1 {
            text-align: center;
            color: #8B0000;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 1.1em;
        }

        select, input {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #1B4D1B;
        }

        .reveal-btn {
            width: 100%;
            padding: 18px;
            font-size: 1.3em;
            font-weight: bold;
            background: linear-gradient(135deg, #1B4D1B 0%, #0B6623 100%);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .reveal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(27, 77, 27, 0.4);
        }

        .reveal-btn:disabled {
            opacity: 0.8;
            cursor: not-allowed;
            transform: none;
        }

        .reveal-btn.loading::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 1.2s infinite;
        }

        @keyframes shimmer {
            to { left: 100%; }
        }

        /* Animation container */
        .animation-container {
            display: none;
            margin-top: 30px;
        }

        .animation-container.active {
            display: block;
        }

        .animation-title {
            text-align: center;
            color: #8B0000;
            font-size: 1.8em;
            margin-bottom: 30px;
            font-weight: bold;
            opacity: 0;
            animation: fadeInDown 0.7s ease forwards;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Gift scene */
        .gift-scene {
            display: flex;
            justify-content: center;
            padding: 30px 20px 20px;
        }

        .gift-wrapper {
            position: relative;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes gift-shake {
            0%   { transform: rotate(0deg) translateX(0); }
            10%  { transform: rotate(-2deg) translateX(-3px); }
            20%  { transform: rotate(2deg) translateX(3px); }
            30%  { transform: rotate(-3.5deg) translateX(-5px); }
            40%  { transform: rotate(3.5deg) translateX(5px); }
            50%  { transform: rotate(-3deg) translateX(-4px); }
            60%  { transform: rotate(3deg) translateX(4px); }
            70%  { transform: rotate(-2deg) translateX(-2px); }
            80%  { transform: rotate(2deg) translateX(2px); }
            90%  { transform: rotate(-1deg) translateX(-1px); }
            100% { transform: rotate(0deg) translateX(0); }
        }

        .gift-wrapper.shaking {
            animation: gift-shake 1s ease-in-out;
            transform-origin: bottom center;
        }

        /* Lid */
        .gift-lid {
            width: 280px;
            height: 72px;
            background: linear-gradient(135deg, #1B5E20 0%, #2E7D32 40%, #1B5E20 100%);
            border-radius: 10px 10px 0 0;
            position: relative;
            z-index: 2;
            box-shadow: 0 -3px 15px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.12);
            transition: transform 0.9s cubic-bezier(0.2, 0.8, 0.4, 1), opacity 0.6s ease 0.1s;
        }

        .gift-lid.open {
            transform: translateY(-260px) rotate(-14deg);
            opacity: 0;
            pointer-events: none;
        }

        /* Ribbon on lid */
        .gift-lid::before {
            content: '';
            position: absolute;
            width: 38px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(to right, #9A6C00, #FFD700, #DAA520, #FFD700, #9A6C00);
            opacity: 0.9;
        }

        /* Bow — child of lid so it flies off with it */
        .gift-bow {
            position: absolute;
            top: -26px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 3.2em;
            z-index: 3;
            filter: drop-shadow(0 3px 6px rgba(0,0,0,0.3));
            pointer-events: none;
            line-height: 1;
        }

        /* Box body */
        .gift-body {
            width: 260px;
            height: 190px;
            background: linear-gradient(160deg, #8B0000 0%, #6B0000 60%, #7D0000 100%);
            border-radius: 0 0 12px 12px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 14px 40px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.05);
            margin-top: -2px;
        }

        /* Vertical ribbon on body */
        .gift-body::before {
            content: '';
            position: absolute;
            width: 38px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(to right, #9A6C00, #FFD700, #DAA520, #FFD700, #9A6C00);
            opacity: 0.9;
            z-index: 1;
        }

        /* Horizontal ribbon on body */
        .gift-body::after {
            content: '';
            position: absolute;
            height: 38px;
            width: 100%;
            top: 28px;
            background: linear-gradient(to bottom, #9A6C00, #FFD700, #DAA520, #FFD700, #9A6C00);
            opacity: 0.9;
            z-index: 1;
        }

        /* Inner liner — revealed when lid opens */
        .gift-inner {
            position: absolute;
            inset: 10px;
            background: linear-gradient(160deg, #fffdf8 0%, #fff4e6 100%);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 2;
        }

        .gift-inner.show {
            opacity: 1;
        }

        .gift-name {
            font-family: 'Georgia', serif;
            font-size: 2em;
            font-weight: bold;
            color: #8B0000;
            text-align: center;
            padding: 0 12px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            line-height: 1.1;
        }

        .gift-name.show {
            opacity: 1;
            transform: translateY(0);
        }

        .gift-divider {
            font-size: 1.2em;
            color: #1B4D1B;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .gift-divider.show {
            opacity: 1;
        }

        /* Confetti */
        .confetti {
            position: fixed;
            top: -15px;
            border-radius: 2px;
            animation: confetti-fall linear forwards;
        }

        .confetti.circle {
            border-radius: 50%;
        }

        @keyframes confetti-fall {
            0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 1; }
            80%  { opacity: 1; }
            100% { transform: translateY(105vh) translateX(var(--drift)) rotate(720deg); opacity: 0; }
        }

        /* Success message */
        .success-message {
            background: linear-gradient(135deg, rgba(27,77,27,0.08) 0%, rgba(27,77,27,0.15) 100%);
            border: 2px solid #1B4D1B;
            color: #0B4D0B;
            padding: 28px 24px;
            border-radius: 15px;
            margin-top: 30px;
            text-align: center;
            font-size: 1.25em;
            font-weight: bold;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.6s ease, transform 0.6s ease;
            line-height: 1.5;
        }

        .success-message .success-sub {
            display: block;
            font-size: 0.75em;
            font-weight: normal;
            margin-top: 8px;
            color: #1B4D1B;
            opacity: 0.85;
        }

        .success-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .error-message {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            color: #721c24;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
        }

        @media (max-width: 600px) {
            body {
                padding: 12px;
            }

            .container {
                padding: 24px 18px;
            }

            h1 {
                font-size: 1.9em;
            }

            .subtitle {
                font-size: 1.05em;
                margin-bottom: 22px;
            }

            select, input {
                font-size: 16px;
                padding: 14px 12px;
            }

            .reveal-btn {
                font-size: 1.15em;
                padding: 20px;
                margin-top: 16px;
            }

            .animation-title {
                font-size: 1.3em;
                margin-bottom: 20px;
            }

            .gift-scene {
                padding: 24px 10px 16px;
            }

            .gift-lid {
                width: min(280px, 90vw);
                height: 64px;
            }

            .gift-body {
                width: min(260px, 84vw);
                height: 170px;
            }

            .gift-name {
                font-size: 1.75em;
            }

            .gift-bow {
                font-size: 2.8em;
                top: -23px;
            }

            .success-message {
                font-size: 1.1em;
                padding: 22px 16px;
                margin-top: 22px;
            }
        }
    </style>
</head>
<body>
    <div id="snowfall"></div>

    <div class="container">
        <h1>🎅 Secret Santa 🎄</h1>

        <div id="form-section">
            <div class="form-group">
                <label for="name-select">Select Your Name:</label>
                <select id="name-select">
                    <option value="">-- Choose your name --</option>
                </select>
            </div>

            <div class="form-group">
                <label for="email-input">Enter Your Email:</label>
                <input type="email" id="email-input" placeholder="your.email@example.com">
            </div>

            <button class="reveal-btn" id="reveal-btn">
                🎁 Reveal My Secret Santa Picks! 🎁
            </button>
        </div>

        <div class="animation-container" id="animation-container">
            <h2 class="animation-title">You're giving gifts to...</h2>

            <div class="gift-scene">
                <div class="gift-wrapper" id="gift-wrapper">
                    <div class="gift-lid" id="gift-lid">
                        <div class="gift-bow">🎀</div>
                    </div>
                    <div class="gift-body">
                        <div class="gift-inner" id="gift-inner">
                            <div class="gift-name" id="name1"></div>
                            <div class="gift-divider" id="gift-divider">&amp;</div>
                            <div class="gift-name" id="name2"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="message-area"></div>
    </div>

    <script>
        const API_URL = 'https://soft-sea-388e.j-makkingrobinson.workers.dev';
        const isMobile = window.innerWidth < 600;
        let selectedName = '';

        function createSnowfall() {
            const snowfall = document.getElementById('snowfall');
            const count = isMobile ? 20 : 50;
            for (let i = 0; i < count; i++) {
                const flake = document.createElement('div');
                flake.classList.add('snowflake');
                flake.innerHTML = '❄';
                flake.style.left = Math.random() * 100 + '%';
                flake.style.animationDuration = (Math.random() * 3 + 2) + 's';
                flake.style.animationDelay = Math.random() * 5 + 's';
                flake.style.fontSize = (Math.random() * 10 + 10) + 'px';
                snowfall.appendChild(flake);
            }
        }

        async function loadFamily() {
            try {
                const response = await fetch(`${API_URL}/api/family`);
                const family = await response.json();
                const select = document.getElementById('name-select');
                family.forEach(member => {
                    const option = document.createElement('option');
                    option.value = member.name;
                    option.textContent = member.name;
                    select.appendChild(option);
                });
            } catch (error) {
                showMessage('Error loading family members. Please refresh the page.', 'error');
            }
        }

        function createConfetti() {
            const colours = ['#C41E3A', '#1B4D1B', '#DAA520', '#B22222', '#2E7D32', '#FFD700', '#8B0000'];
            const count = isMobile ? 60 : 120;
            for (let i = 0; i < count; i++) {
                const el = document.createElement('div');
                el.classList.add('confetti');
                if (Math.random() > 0.5) el.classList.add('circle');

                el.style.background = colours[Math.floor(Math.random() * colours.length)];
                const size = Math.random() * 8 + 6;
                el.style.width = size + 'px';
                el.style.height = size + 'px';
                el.style.left = Math.random() * 100 + '%';

                const drift = (Math.random() - 0.5) * 250;
                el.style.setProperty('--drift', drift + 'px');

                const duration = Math.random() * 2 + 2.5;
                el.style.animationDuration = duration + 's';
                el.style.animationDelay = Math.random() * 0.6 + 's';

                document.body.appendChild(el);
                setTimeout(() => el.remove(), (duration + 0.6) * 1000 + 500);
            }
        }

        function showMessage(text, type) {
            const area = document.getElementById('message-area');
            const div = document.createElement('div');
            div.className = type === 'error' ? 'error-message' : 'success-message';
            if (type === 'success') {
                div.innerHTML = text;
            } else {
                div.textContent = text;
            }
            area.innerHTML = '';
            area.appendChild(div);
            if (type === 'success') {
                setTimeout(() => div.classList.add('show'), 100);
            }
        }

        async function revealRecipients(recipient1, recipient2) {
            const formSection = document.getElementById('form-section');
            const animationContainer = document.getElementById('animation-container');

            document.getElementById('name1').textContent = recipient1;
            document.getElementById('name2').textContent = recipient2;

            formSection.style.display = 'none';
            animationContainer.classList.add('active');
            animationContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });

            // Shake the gift
            await new Promise(r => setTimeout(r, 600));
            document.getElementById('gift-wrapper').classList.add('shaking');

            // Lid flies off
            await new Promise(r => setTimeout(r, 1100));
            document.getElementById('gift-wrapper').classList.remove('shaking');
            await new Promise(r => setTimeout(r, 200));
            document.getElementById('gift-lid').classList.add('open');

            // Inner liner fades in
            await new Promise(r => setTimeout(r, 550));
            document.getElementById('gift-inner').classList.add('show');

            // Name 1
            await new Promise(r => setTimeout(r, 350));
            document.getElementById('name1').classList.add('show');

            // Divider
            await new Promise(r => setTimeout(r, 500));
            document.getElementById('gift-divider').classList.add('show');

            // Name 2
            await new Promise(r => setTimeout(r, 300));
            document.getElementById('name2').classList.add('show');

            // Confetti
            await new Promise(r => setTimeout(r, 800));
            createConfetti();

            // Success message
            await new Promise(r => setTimeout(r, 900));
            showMessage(
                `🎄 Merry Christmas, ${selectedName}! 🎄<span class="success-sub">A copy has been sent to your email too. 📬</span>`,
                'success'
            );
        }

        document.getElementById('reveal-btn').addEventListener('click', async () => {
            const name = document.getElementById('name-select').value;
            const email = document.getElementById('email-input').value;
            selectedName = name;

            if (!name) {
                showMessage('Please select your name!', 'error');
                return;
            }

            if (!email || !email.includes('@')) {
                showMessage('Please enter a valid email address!', 'error');
                return;
            }

            const btn = document.getElementById('reveal-btn');
            btn.disabled = true;
            btn.classList.add('loading');
            btn.textContent = '✨ Generating Magic... ✨';

            try {
                const response = await fetch(`${API_URL}/api/get-assignment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to get assignment');
                }

                await revealRecipients(data.recipient1, data.recipient2);

            } catch (error) {
                console.error('Error:', error);
                showMessage('Something went wrong! Please try again.', 'error');
                btn.disabled = false;
                btn.classList.remove('loading');
                btn.textContent = '🎁 Reveal My Secret Santa Picks! 🎁';
            }
        });

        createSnowfall();
        loadFamily();
    </script>
</body>
</html>
